{% extends "layout.html" %}

{% block title %}
App Page
{% endblock %}

{% block content %}
<h1>This is the Cha page.</h1>

<div class= "grid grid-cols-3 gap-1">
{% for chai in cha  %}
<div class="bg-blue-900 p-3 rounded-2xl">
    <img class= "rounded-2xl shadow-2xl" src="{{ chai.image.url }}" alt="">
    <h3 class= "text-2xl font-bold">{{ chai.name }}</h3>
    <a href="{% url 'cha_details' chai.id %}">
        <button
        type ="button"
        class="inline-flex items-center w-full justify-center text-white bg-orange-800 hover:bg-orange-950" 
        >
        {{chai.chaType }}- {{chai.id}}
        </button>
    </a>
</div>
{% endfor %}

</div>
{% endblock %}
